name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Resolve symlinks so public/game is a real folder on the runner
          fetch-depth: 1

      - name: Resolve symlink — copy src/game to a temp folder
        run: |
          cp -rL src/game /tmp/game-files

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Expo web
        run: npx expo export --platform web
        env:
          NODE_ENV: production

      - name: Copy game files into dist
        run: |
          mkdir -p dist/game
          cp -r /tmp/game-files/. dist/game/

      - name: List dist contents for verification
        run: ls -la dist/ && ls -la dist/game/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4